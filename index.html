<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>데이스쿼트 프로토타입</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{--purple:#6a3fa0;--purple-deep:#522a82;--ink:#3c2f4d;--muted:#9b93a8;--line:#efeaf4}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',sans-serif;color:var(--ink);background:linear-gradient(180deg,#efe8f8,#fdeede 70%,#eaf6ee);min-height:100vh;padding:40px 18px 60px}
  .wrap{max-width:460px;margin:0 auto}
  .jua{font-family:'Jua',sans-serif}
  h1{font-family:'Jua';font-size:30px;color:var(--purple);text-align:center;letter-spacing:-.5px}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-top:6px}
  .grid{margin-top:26px;display:flex;flex-direction:column;gap:16px}
  a.card{display:block;text-decoration:none;color:inherit;background:#fff;border-radius:24px;padding:22px;box-shadow:0 12px 28px rgba(106,63,160,.12);border:1.5px solid var(--line);transition:transform .12s,box-shadow .12s}
  a.card:active{transform:scale(.99)}
  .card .tag{display:inline-block;font-size:11px;font-weight:800;padding:4px 11px;border-radius:999px;margin-bottom:10px}
  .card.battle .tag{background:#e9f1ff;color:#2f6fe0}
  .card.coop .tag{background:#e7f6e6;color:#5fb85a}
  .card h2{font-family:'Jua';font-size:22px}
  .card p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
  .card .go{margin-top:14px;display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:14px;color:var(--purple)}
  .foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:28px;line-height:1.6}
</style>
</head>
<body>
  <div class="wrap">
    <h1>데이스쿼트 프로토타입</h1>
    <div class="sub">모바일(세로) 화면에 최적화된 데모입니다 · 우측 하단 ⚙️ 로 시연</div>
    <div class="grid">
      <a class="card coop" href="./daily-goal-flow.html">
        <span class="tag">🤝 협동 · 단체 목표</span>
        <h2>홈 ↔ 다같이 스쿼트</h2>
        <p>홈 화면의 커뮤니티 버튼(LIVE·대화수 뱃지) → 다같이 하나의 목표를 채우는 데일리 골 화면으로 연결되는 통합 플로우.</p>
        <span class="go">데모 열기 →</span>
      </a>
      <a class="card battle" href="./team-squat-battle.html">
        <span class="tag">⚔️ 경쟁 · 팀 배틀</span>
        <h2>팀 스쿼트 배틀</h2>
        <p>매일 06시 청팀 vs 홍팀 랜덤 편성, 실시간 스코어·역전 부스트, 22시 승리 배지. 경쟁형 컨셉.</p>
        <span class="go">데모 열기 →</span>
      </a>
    </div>
    <div class="foot">프로토타입 · 시뮬레이션 데이터입니다.<br>실제 운영 데이터가 아닙니다.</div>
  </div>
</body>
</html>
